file_format: definition/2
attributes:
  - key: app.environment
    type: string
    stability: development
    brief: >
      The runtime environment in which the app is deployed.
    examples: ["prod", "dev", "staging"]
  - key: app.nav.destination
    type: string
    stability: development
    brief: >
      A human-readable string that uniquely identifies the destination of app navigation. This value
      should not contain high-cardinality dimensions like user ID, which should be replaced with a
      generic token if programmatically determined.
    examples: [ "Home Page", "com.app.UserActivity", "{userId} Profile" ]
