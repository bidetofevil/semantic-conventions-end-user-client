name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install weaver
        run: |
          WEAVER_VERSION="$(<.weaver-version)"
          curl -sSfL -o weaver.tar.xz \
            "https://github.com/open-telemetry/weaver/releases/download/v${WEAVER_VERSION}/weaver-x86_64-unknown-linux-gnu.tar.xz"
          curl -sSfL -o weaver.tar.xz.sha256 \
            "https://github.com/open-telemetry/weaver/releases/download/v${WEAVER_VERSION}/weaver-x86_64-unknown-linux-gnu.tar.xz.sha256"
          echo "$(awk '{print $1}' weaver.tar.xz.sha256)  weaver.tar.xz" | sha256sum -c -
          tar -xJf weaver.tar.xz
          echo "${PWD}/weaver-x86_64-unknown-linux-gnu" >> "${GITHUB_PATH}"

      - name: Validate registry
        run: scripts/check.sh

      - name: Generate docs
        run: scripts/generate-docs.sh

      - name: Check docs drift
        run: git diff --exit-code docs/
